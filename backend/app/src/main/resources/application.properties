quarkus.application.name=seller-cockpit-api
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:postgres}
quarkus.datasource.password=${POSTGRES_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/sellercockpit}

# Hibernate
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# Object Storage (MinIO)
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:seller-cockpit-media}

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# OpenAPI
quarkus.smallrye-openapi.info-title=Seller Cockpit API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=AI-powered seller cockpit API

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.sellercockpit".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Requested-With

# eBay API
ebay.api.base-url=${EBAY_API_BASE_URL:https://api.ebay.com}
ebay.auth-url=${EBAY_AUTH_URL:https://auth.ebay.com}
ebay.api.client-id=
ebay.api.client-secret=
ebay.redirect-uri=${EBAY_REDIRECT_URI:http://localhost:8080/api/marketplaces/ebay/callback}

# eBay Finding API (free read-only search — get app-id at developer.ebay.com)
ebay.finding.app-id=${EBAY_FINDING_APP_ID:}
ebay.finding.global-id=${EBAY_GLOBAL_ID:EBAY-DE}

# Token encryption (hex-encoded 32-byte AES key, or blank for dev mode plaintext)
security.encryption-key=

# AI Provider Configuration (choose primary and fallback)
ai.primary-provider=${AI_PRIMARY_PROVIDER:openai}
ai.fallback-provider=${AI_FALLBACK_PROVIDER:anthropic}

# OpenAI (recommended, official API)
ai.openai.api-key=
ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
ai.openai.model=${OPENAI_MODEL:gpt-4o}
ai.openai.max-tokens=4096
ai.openai.temperature=0.2

# Anthropic Claude
ai.anthropic.api-key=
ai.anthropic.base-url=${ANTHROPIC_BASE_URL:https://api.anthropic.com}
ai.anthropic.model=${ANTHROPIC_MODEL:claude-3-opus-20240229}
ai.anthropic.max-tokens=4096

# Google Gemini
ai.gemini.api-key=
ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
ai.gemini.model=${GEMINI_MODEL:gemini-1.5-pro-latest}

# ChatGPT Reverse Proxy (unofficial, unsupported)
# Requires a proxy like https://github.com/pengzhile/pandora
ai.chatgpt-proxy.api-key=
ai.chatgpt-proxy.base-url=
ai.chatgpt-proxy.model=gpt-4

# Mock AI (fallback when no provider configured, for local dev)
ai.mock.enabled=${AI_MOCK_ENABLED:false}

# Research settings
research.ebay.enabled=${RESEARCH_EBAY_ENABLED:true}
research.kleinanzeigen.enabled=${RESEARCH_KLEINANZEIGEN_ENABLED:true}
research.max-results-per-source=${RESEARCH_MAX_RESULTS:25}
research.outlier-z-threshold=${RESEARCH_OUTLIER_Z:3.0}
research.min-confidence=${RESEARCH_MIN_CONFIDENCE:LOW}

# Firebase Auth (configure with your Firebase project ID)
firebase.project-id=${FIREBASE_PROJECT_ID:test-project-id}
# Path to service account JSON file (optional; if omitted, uses GCP Application Default Credentials)
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
