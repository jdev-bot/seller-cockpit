quarkus.smallrye-jwt.enabled=false
quarkus.keycloak.devservices.enabled=false
quarkus.oidc.enabled=false
quarkus.http.test-port=0
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.flyway.enabled=false

# Firebase
firebase.project-id=test-project-id
# Note: empty jwks-url = skip signature validation (dev/test mode)
firebase.jwks-url=

# MinIO
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=test

# eBay
ebay.api.base-url=https://api.ebay.com
ebay.api.client-id=test-id
ebay.api.client-secret=test-secret
ebay.auth-url=https://auth.ebay.com
ebay.redirect-uri=http://localhost:8080/api/marketplaces/ebay/callback
ebay.finding.app-id=test-app-id
ebay.finding.global-id=EBAY-DE

# Encryption
security.encryption-key=test-encryption-key

# AI config
ai.primary-provider=openai
ai.fallback-provider=anthropic
ai.openai.api-key=test-openai-key
ai.openai.base-url=https://api.openai.com/v1
ai.openai.model=gpt-4o
ai.openai.max-tokens=4096
ai.openai.temperature=0.2
ai.anthropic.api-key=test-anthropic-key
ai.anthropic.base-url=https://api.anthropic.com
ai.anthropic.model=claude-3-opus-20240229
ai.anthropic.max-tokens=4096
ai.gemini.api-key=test-gemini-key
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
ai.gemini.model=gemini-1.5-pro-latest
ai.chatgpt-proxy.api-key=test-proxy-key
ai.chatgpt-proxy.base-url=http://localhost:8080
ai.chatgpt-proxy.model=gpt-4

# Research
research.ebay.enabled=true
research.kleinanzeigen.enabled=true
research.max-results-per-source=25
research.min-confidence=LOW
research.outlier-z-threshold=3.0
